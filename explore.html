<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>創作探索 | 玖葵 Jiukui</title>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar">
<div class="logo">
<img alt="Logo" decoding="async" height="320" loading="eager" src="webphoto/logo.webp" width="256"/>
</div>
<ul class="nav-links">
<li><a href="index.html">首頁</a></li>
<li><a href="all-artworks.html">作品</a></li>
<li><a href="explore.html">創作探索</a></li>
<li><a href="index.html#contact">聯絡</a></li>
</ul>
<div class="hamburger">
<div class="line"></div>
<div class="line"></div>
<div class="line"></div>
</div>
</nav>

<!-- 創作探索页面 -->
<section class="explore-section" id="explore">
  <div class="explore-intro">
    <h2>創作探索</h2>
  </div>

  <!-- 3D列印視頻展示區域 -->
  <div class="videos-section">
    <h2>3D創作</h2>
    <div class="video-container">
      <!-- 视频将通过JavaScript动态加载 -->
    </div>
    <div class="model-images">
      <div class="model-image-item">
        <img alt="上色前" decoding="async" height="800" loading="lazy" sizes="(max-width: 768px) 90vw, 45vw" src="webphoto/new-beforecolor-800.webp" srcset="webphoto/new-beforecolor-480.webp 480w, webphoto/new-beforecolor-800.webp 800w" width="800"/>
      </div>
      <div class="model-image-item">
        <img alt="上色後" decoding="async" height="800" loading="lazy" sizes="(max-width: 768px) 90vw, 45vw" src="webphoto/aftercolor-800.webp" srcset="webphoto/aftercolor-480.webp 480w, webphoto/aftercolor-800.webp 800w, webphoto/aftercolor-1200.webp 1200w" width="800"/>
      </div>
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- 遊戲作品區域 -->
  <div class="games-section">
    <h2>遊戲小實驗</h2>
    <p class="game-note"></p>
    <div class="game-grid">
      <div class="game-item">
        <div class="game-image">
          <img alt="小鳥跳躍遊戲封面" decoding="async" height="269" loading="lazy" sizes="(max-width: 768px) 90vw, 30vw" src="webphoto/bird-jump-cover-480.webp" srcset="webphoto/bird-jump-cover-480.webp 480w" width="480"/>
        </div>
        <div class="game-content">
          <h3>小鳥跳躍</h3>
          <p>控制小鳥閃避障礙，挑戰高分。</p>
          <a class="game-link" href="bird-jump/index.html" target="_blank">開始遊戲</a>
        </div>
      </div>
      <div class="game-item">
        <div class="game-image">
          <img alt="小雞過馬路遊戲封面" decoding="async" height="270" loading="lazy" sizes="(max-width: 768px) 90vw, 30vw" src="webphoto/cross-chicken-cover-480.webp" srcset="webphoto/cross-chicken-cover-480.webp 480w" width="480"/>
        </div>
        <div class="game-content">
          <h3>小雞過馬路</h3>
          <p>幫助小雞避開車輛，安全過馬路。</p>
          <a class="game-link" href="cross-chicken/index.html" target="_blank">開始遊戲</a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- 页脚 -->
<footer>
  <div class="footer-content">
    <p>© 2026 玖葵 Jiukui</p>
  </div>
</footer>

<!-- 返回顶部按钮：手机端显示 -->
<button aria-label="返回顶部" class="back-to-top" title="返回顶部">
  <svg aria-hidden="true" class="back-to-top-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="m4.5 15.75 7.5-7.5 7.5 7.5" stroke-linecap="round" stroke-linejoin="round"></path>
  </svg>
</button>
<script src="script.js"></script>
</body>
</html>
