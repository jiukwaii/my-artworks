<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創作探索 | 玖葵 Jiukui</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .explore-page {
            padding-top: 8rem;
        }
        
        /* 3D列印視頻區域 */
        .videos-section {
            padding: 4rem 5%;
        }
        .videos-section h2 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }
        .video-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .video-item {
            margin-bottom: 3rem;
        }
        .video-item video {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .video-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-top: 1rem;
            color: #333;
        }
        
        /* 遊戲作品區域 */
        .games-section {
            padding: 4rem 5%;
            background-color: #f9f9f9;
        }
        .games-section h2 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-item {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }
        .game-item:hover {
            transform: translateY(-10px);
        }
        .game-image {
            height: 200px;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .game-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .game-content {
            padding: 1.5rem;
        }
        .game-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .game-content p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        .game-link {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }
        .game-link:hover {
            background-color: #555;
        }
        
        /* 分隔線 */
        .section-divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #ddd, transparent);
            margin: 2rem 0;
        }
        
        @media screen and (max-width: 768px) {
            .game-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <img src="logo.jpg" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html#home">首頁</a></li>
            <li><a href="index.html#about">關於我</a></li>
            <li><a href="artworks.html">作品集</a></li>
            <li><a href="explore.html">創作探索</a></li>
            <li><a href="index.html#contact">聯絡</a></li>
        </ul>
        <div class="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </nav>

    <!-- 創作探索頁面 -->
    <main class="explore-page">
        <!-- 3D列印視頻展示區域 -->
        <section id="videos" class="videos-section">
            <h2>3D列印模型展示</h2>
            <div class="video-container">
                <!-- 视频将通过JavaScript动态加载 -->
            </div>
        </section>

        <div class="section-divider"></div>

        <!-- 遊戲作品區域 -->
        <section id="games" class="games-section">
            <h2>遊戲作品</h2>
            <div class="game-grid">
                <div class="game-item">
                    <div class="game-image">
                        <img src="gamecover/小鸟跳跃.png" alt="小鳥跳躍遊戲封面">
                    </div>
                    <div class="game-content">
                        <h3>小鳥跳躍</h3>
                        <p>一款簡單有趣的跳躍類遊戲，控制小鳥避開障礙物，儘可能獲得高分。</p>
                        <a href="game/小鸟跳跃.html" class="game-link" target="_blank">開始遊戲</a>
                    </div>
                </div>
                <div class="game-item">
                    <div class="game-image">
                        <img src="gamecover/小鸡过马路.jpg" alt="小雞過馬路遊戲封面">
                    </div>
                    <div class="game-content">
                        <h3>小雞過馬路</h3>
                        <p>幫助小雞安全過馬路，避開各種車輛和障礙物，到達對面的安全區域。</p>
                        <a href="game/小鸡过马路.html" class="game-link" target="_blank">開始遊戲</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2025 玖葵 Jiukui</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
